services:
  mongo:
    image: mongo:7
    # Sem exposição de porta para evitar conflito com outros containers MongoDB
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./ragtree-api
    ports:
      - "3001:3001"
    env_file: ./ragtree-api/.env
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo-express:
    image: mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./ragtree-web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    env_file: ./ragtree-web/.env.local
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongo_data:
